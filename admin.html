<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Turnos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--verde:#1a7a4a;--verde-light:#e8f5ee;--azul:#1a4fa0;--azul-light:#e8eef9;--rojo:#c0392b;--rojo-light:#fdf0ee;--gris:#6b6f76;--gris-light:#f2f2f0;--bg:#fafaf8;--text:#1a1a18;--border:#e2e2de;--white:#ffffff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px}
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:36px;width:100%;max-width:520px}
.card+.card{margin-top:20px}
h1{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:4px}
.sub{font-size:13px;color:var(--gris);margin-bottom:24px}
label{display:block;font-size:12px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--gris);margin-bottom:6px;margin-top:18px}
input[type=text],input[type=password]{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;background:var(--bg);color:var(--text)}
input:focus{border-color:var(--azul)}
.btn{padding:10px 20px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s}
.btn-primary{background:var(--azul);color:#fff}.btn-primary:hover{opacity:.88}
.btn-secondary{background:var(--gris-light);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{opacity:.8}
.btn-full{width:100%;padding:11px;font-size:14px}
.msg{font-size:13px;padding:10px 14px;border-radius:7px;margin-top:14px;display:none}
.msg-ok{background:var(--verde-light);color:var(--verde)}
.msg-err{background:var(--rojo-light);color:var(--rojo)}
.msg-info{background:var(--azul-light);color:var(--azul)}
.drop-area{border:2px dashed var(--border);border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-top:16px}
.drop-area:hover,.drop-area.over{border-color:var(--azul);background:#f0f4fc}
.drop-area strong{display:block;font-size:14px;color:var(--text);margin-bottom:4px}
.drop-area p{font-size:13px;color:var(--gris)}
.file-info{font-size:12px;color:var(--gris);margin-top:10px;min-height:18px}
.preview-wrap{margin-top:16px;max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;display:none}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--gris-light);padding:7px 10px;text-align:left;position:sticky;top:0;font-weight:500}
td{padding:6px 10px;border-top:1px solid var(--border)}
.divider{border:none;border-top:1px solid var(--border);margin:22px 0}
.back{font-size:13px;color:var(--gris);text-decoration:none;display:inline-block;margin-bottom:20px}
.back:hover{color:var(--text)}
.top-bar{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.token-note{font-size:11px;color:var(--gris);margin-top:6px;line-height:1.5}
code{font-size:11px;background:var(--gris-light);padding:1px 5px;border-radius:3px}
a{color:var(--azul)}
</style>
</head>
<body>

<a href="turnos.html" class="back">← Volver a turnos</a>

<div class="card" id="section-login">
  <h1>Administración</h1>
  <p class="sub">Solo para administradores.</p>
  <label>Usuario</label>
  <input type="text" id="login-user" placeholder="usuario" onkeydown="if(event.key==='Enter')doLogin()">
  <label>Contraseña</label>
  <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
  <br><br>
  <button class="btn btn-primary btn-full" onclick="doLogin()">Ingresar</button>
  <div class="msg msg-err" id="login-msg">Usuario o contraseña incorrectos.</div>
</div>

<div class="card" id="section-panel" style="display:none">
  <div class="top-bar">
    <div><h1>Actualizar turnos</h1><p class="sub" id="panel-user"></p></div>
    <button class="btn btn-secondary" onclick="doLogout()">Salir</button>
  </div>

  <div class="drop-area" id="drop-area" onclick="document.getElementById('file-input').click()">
    <strong>Arrastrá el Excel acá</strong>
    <p>o hacé click para seleccionar</p>
    <input type="file" id="file-input" accept=".xls,.xlsx" style="display:none" onchange="handleFile(this.files[0])">
  </div>
  <div class="file-info" id="file-info"></div>
  <div class="preview-wrap" id="preview-wrap">
    <table><thead id="preview-head"></thead><tbody id="preview-body"></tbody></table>
  </div>
  <div id="publish-section" style="display:none;margin-top:16px">
    <button class="btn btn-primary btn-full" id="btn-publish" onclick="publicar()">Publicar turnos</button>
    <div class="msg" id="publish-msg"></div>
  </div>
</div>

<div class="card" id="section-config" style="display:none">
  <h1>Configuración de GitHub</h1>
  <p class="sub">Se guarda en este navegador. Solo necesitás hacerlo una vez.</p>
  <label>Personal Access Token</label>
  <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx">
  <p class="token-note">Token con permisos <code>repo</code>. <a href="https://github.com/settings/tokens/new" target="_blank">Crear acá →</a></p>
  <label>Usuario de GitHub</label>
  <input type="text" id="gh-owner" placeholder="mi-usuario">
  <label>Nombre del repositorio</label>
  <input type="text" id="gh-repo" placeholder="turnos-web">
  <br><br>
  <button class="btn btn-secondary" onclick="saveConfig()">Guardar configuración</button>
  <div class="msg" id="config-msg"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const ADMINS = [
  {user:'admin', passHash:'240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9'},
];

async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

let currentUser=null;
let parsedData=null;

function showMsg(id,text,type){const el=document.getElementById(id);el.textContent=text;el.className='msg msg-'+type;el.style.display='block';}
function hideMsg(id){document.getElementById(id).style.display='none';}

async function doLogin(){
  const user=document.getElementById('login-user').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!user||!pass){showMsg('login-msg','Completá los campos.','err');return;}
  const hash=await sha256(pass);
  const found=ADMINS.find(u=>u.user===user&&u.passHash===hash);
  if(!found){showMsg('login-msg','Usuario o contraseña incorrectos.','err');return;}
  currentUser=user;
  sessionStorage.setItem('admin_user',user);
  document.getElementById('section-login').style.display='none';
  document.getElementById('section-panel').style.display='block';
  document.getElementById('section-config').style.display='block';
  document.getElementById('panel-user').textContent='Sesión como '+currentUser;
  loadConfig();
}
function doLogout(){
  sessionStorage.removeItem('admin_user');
  document.getElementById('section-panel').style.display='none';
  document.getElementById('section-config').style.display='none';
  document.getElementById('section-login').style.display='block';
  document.getElementById('login-pass').value='';
}

const drop=document.getElementById('drop-area');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over');});
drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f)handleFile(f);});

function handleFile(file){
  document.getElementById('file-info').textContent='Procesando '+file.name+'...';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      parsedData=parseRows(rows);
      showPreview(parsedData);
      document.getElementById('file-info').textContent=`✓ ${file.name} — ${parsedData.length} turnos encontrados`;
      document.getElementById('publish-section').style.display='block';
      hideMsg('publish-msg');
    }catch(err){document.getElementById('file-info').textContent='Error: '+err.message;}
  };
  reader.readAsArrayBuffer(file);
}
function parseRows(rows){
  let hi=0;
  for(let i=0;i<Math.min(10,rows.length);i++){
    const r=rows[i].map(c=>String(c||'').toLowerCase());
    if(r.some(c=>c.includes('especialidad')||c.includes('lugar'))){hi=i;break;}
  }
  const h=rows[hi].map(c=>String(c||'').toLowerCase().trim());
  const ci=h.findIndex(x=>x.includes('lugar'));
  const ei=h.findIndex(x=>x.includes('especialidad'));
  const pi=h.findIndex(x=>x.includes('profesional'));
  const fi=h.findIndex(x=>x.includes('fecha'));
  const oi=h.findIndex(x=>x.includes('hora'));
  const t=[];
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];
    if(!r||!r[ei])continue;
    let fecha='';
    if(r[fi]){
      const raw=r[fi];
      if(typeof raw==='number'){const d=new Date(Math.round((raw-25569)*86400*1000));fecha=d.toISOString().split('T')[0];}
      else{const d=new Date(raw);fecha=isNaN(d)?String(raw).substring(0,10):d.toISOString().split('T')[0];}
    }
    const centro=String(r[ci]||'').trim();
    const esp=String(r[ei]||'').trim().toUpperCase();
    const prof=r[pi]?toTC(String(r[pi]).trim()):'';
    const hora=r[oi]?String(r[oi]).trim():'';
    if(centro&&esp&&fecha)t.push({centro,esp,prof,fecha,hora});
  }
  return t;
}
function toTC(s){return s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());}
function showPreview(data){
  const w=document.getElementById('preview-wrap');
  document.getElementById('preview-head').innerHTML='<tr><th>Centro</th><th>Especialidad</th><th>Profesional</th><th>Fecha</th><th>Hora</th></tr>';
  document.getElementById('preview-body').innerHTML=data.slice(0,8).map(r=>`<tr><td>${r.centro}</td><td>${r.esp.charAt(0)+r.esp.slice(1).toLowerCase()}</td><td>${r.prof}</td><td>${r.fecha}</td><td>${r.hora}</td></tr>`).join('');
  w.style.display='block';
}
async function publicar(){
  const token=document.getElementById('gh-token').value.trim();
  const owner=document.getElementById('gh-owner').value.trim();
  const repo=document.getElementById('gh-repo').value.trim();
  if(!token||!owner||!repo){showMsg('publish-msg','Completá la configuración de GitHub.','err');return;}
  if(!parsedData||!parsedData.length){showMsg('publish-msg','No hay datos.','err');return;}
  document.getElementById('btn-publish').disabled=true;
  document.getElementById('btn-publish').textContent='Publicando...';
  showMsg('publish-msg','Subiendo a GitHub...','info');
  try{
    const json={updated:new Date().toISOString(),turnos:parsedData};
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(json,null,2))));
    const path='data/turnos.json';
    let sha='';
    const gr=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{headers:{Authorization:`token ${token}`,'Accept':'application/vnd.github.v3+json'}});
    if(gr.ok){const d=await gr.json();sha=d.sha;}
    const body={message:`Actualización de turnos — ${new Date().toLocaleString('es-AR')}`,content,committer:{name:'Admin Turnos',email:'admin@turnos.local'}};
    if(sha)body.sha=sha;
    const pr=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{method:'PUT',headers:{Authorization:`token ${token}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!pr.ok){const e=await pr.json();throw new Error(e.message||'Error');}
    showMsg('publish-msg','✓ Publicado. Los cambios se ven en ~1 minuto.','ok');
  }catch(e){showMsg('publish-msg','Error: '+e.message,'err');}
  document.getElementById('btn-publish').disabled=false;
  document.getElementById('btn-publish').textContent='Publicar turnos';
}
function saveConfig(){
  localStorage.setItem('gh_token',document.getElementById('gh-token').value.trim());
  localStorage.setItem('gh_owner',document.getElementById('gh-owner').value.trim());
  localStorage.setItem('gh_repo',document.getElementById('gh-repo').value.trim());
  showMsg('config-msg','Guardado.','ok');
  setTimeout(()=>hideMsg('config-msg'),2000);
}
function loadConfig(){
  document.getElementById('gh-token').value=localStorage.getItem('gh_token')||'';
  document.getElementById('gh-owner').value=localStorage.getItem('gh_owner')||'';
  document.getElementById('gh-repo').value=localStorage.getItem('gh_repo')||'';
}
// Auto-login admin si ya tiene sesión de viewer con rol admin
const saved=sessionStorage.getItem('admin_user');
if(saved&&ADMINS.find(u=>u.user===saved)){
  currentUser=saved;
  document.getElementById('section-login').style.display='none';
  document.getElementById('section-panel').style.display='block';
  document.getElementById('section-config').style.display='block';
  document.getElementById('panel-user').textContent='Sesión como '+currentUser;
  loadConfig();
}
</script>
</body>
</html>
