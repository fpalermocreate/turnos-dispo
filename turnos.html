<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turnos Libres</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--verde:#1a7a4a;--verde-light:#e8f5ee;--azul:#1a4fa0;--azul-light:#e8eef9;--gris:#6b6f76;--gris-light:#f2f2f0;--bg:#fafaf8;--text:#1a1a18;--border:#e2e2de;--white:#ffffff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--white);border-bottom:1px solid var(--border);padding:22px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header-left h1{font-family:'DM Serif Display',serif;font-size:24px;font-weight:400;letter-spacing:-.3px}
.header-left p{font-size:12px;color:var(--gris);margin-top:3px}
.header-right{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.header-stats{display:flex;gap:20px}
.stat-pill .num{font-size:20px;font-weight:500;line-height:1}
.stat-pill .lbl{font-size:11px;color:var(--gris);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.num-verde{color:var(--verde)}.num-azul{color:var(--azul)}
.user-badge{font-size:12px;color:var(--gris);display:flex;align-items:center;gap:8px}
.logout-btn{font-size:12px;color:var(--gris);background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.logout-btn:hover{background:var(--gris-light)}
.admin-link{font-size:12px;color:var(--azul);text-decoration:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;display:none}
.admin-link:hover{background:var(--azul-light)}
.controls{padding:14px 40px;background:var(--white);border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.controls select,.controls input{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);outline:none}
.controls select:focus,.controls input:focus{border-color:var(--azul)}
.count-label{margin-left:auto;font-size:12px;color:var(--gris)}
.main{padding:28px 40px}
.section+.section{margin-top:32px}
.section-header{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.section-header h2{font-family:'DM Serif Display',serif;font-size:17px;font-weight:400}
.count-badge{font-size:11px;background:var(--gris-light);color:var(--gris);padding:2px 8px;border-radius:20px;font-weight:500}
.badge-green{background:var(--verde-light);color:var(--verde)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;transition:box-shadow .15s,border-color .15s}
.card:hover{border-color:#c8c8c4;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-urgency{position:absolute;top:12px;right:12px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.urg-hoy{background:var(--verde-light);color:var(--verde)}
.urg-semana{background:var(--azul-light);color:var(--azul)}
.urg-mas{background:var(--gris-light);color:var(--gris)}
.card-prof{font-size:13px;font-weight:500;margin-bottom:10px;padding-right:90px;line-height:1.3}
.card-fecha{font-size:13px}.card-hora{font-size:12px;color:var(--gris);margin-top:1px}
.card-centro{font-size:11px;color:#aaa;margin-top:8px;border-top:1px solid var(--gris-light);padding-top:8px}
.empty{color:var(--gris);font-size:14px;padding:20px 0}
.loading{text-align:center;padding:60px;color:var(--gris);font-size:14px}
.last-update{font-size:11px;color:var(--gris);opacity:.7}
@media(max-width:600px){.header,.controls,.main{padding-left:16px;padding-right:16px}.header-stats{gap:12px}}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Turnos libres disponibles</h1>
    <p class="last-update" id="last-update"></p>
  </div>
  <div class="header-right">
    <div class="header-stats">
      <div class="stat-pill"><div class="num num-verde" id="cnt-hoy">—</div><div class="lbl">Hoy/mañana</div></div>
      <div class="stat-pill"><div class="num num-azul" id="cnt-semana">—</div><div class="lbl">Esta semana</div></div>
      <div class="stat-pill"><div class="num" id="cnt-total">—</div><div class="lbl">Total</div></div>
    </div>
    <div class="user-badge">
      <span id="user-label"></span>
      <a href="admin.html" class="admin-link" id="admin-link">⚙ Admin</a>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </div>
</div>

<div class="controls">
  <select id="sel-centro"><option value="">Todos los centros</option></select>
  <select id="sel-esp"><option value="">Todas las especialidades</option></select>
  <select id="sel-urgencia">
    <option value="">Cualquier fecha</option>
    <option value="hoy">Hoy / mañana</option>
    <option value="semana">Esta semana</option>
  </select>
  <input type="text" id="buscador" placeholder="Buscar profesional...">
  <span class="count-label" id="result-count"></span>
</div>

<div class="main" id="main"><div class="loading">Cargando turnos...</div></div>

<script>
// Admins que pueden ver el link de admin (mismos que en admin.html)
const ADMINS = ['admin'];

// Verificar sesión
const currentUser = sessionStorage.getItem('viewer_user');
if(!currentUser) { window.location.href = 'login.html'; }
document.getElementById('user-label').textContent = currentUser;
if(ADMINS.includes(currentUser)) document.getElementById('admin-link').style.display = 'inline';

function doLogout(){
  sessionStorage.removeItem('viewer_user');
  window.location.href = 'login.html';
}

let TURNOS = [];
const TODAY = new Date();

function urgencia(f){
  const d=new Date(f+'T00:00:00');
  const manana=new Date(TODAY); manana.setDate(manana.getDate()+1);
  const semFin=new Date(TODAY); semFin.setDate(semFin.getDate()+(7-semFin.getDay()));
  if(d<=manana) return 'hoy';
  if(d<=semFin) return 'semana';
  return 'mas';
}
function fechaLabel(f){
  const d=new Date(f+'T00:00:00');
  const dias=['dom','lun','mar','mié','jue','vie','sáb'];
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
}
function filtered(){
  const q=document.getElementById('buscador').value.toLowerCase().trim();
  const sc=document.getElementById('sel-centro').value;
  const se=document.getElementById('sel-esp').value;
  const su=document.getElementById('sel-urgencia').value;
  return TURNOS.filter(r=>{
    if(sc&&r.centro!==sc)return false;
    if(se&&r.esp!==se)return false;
    if(su==='hoy'&&urgencia(r.fecha)!=='hoy')return false;
    if(su==='semana'&&urgencia(r.fecha)==='mas')return false;
    if(q&&!r.prof.toLowerCase().includes(q))return false;
    return true;
  });
}
function render(){
  const data=filtered();
  document.getElementById('cnt-hoy').textContent=data.filter(r=>urgencia(r.fecha)==='hoy').length;
  document.getElementById('cnt-semana').textContent=data.filter(r=>urgencia(r.fecha)==='semana').length;
  document.getElementById('cnt-total').textContent=data.length;
  document.getElementById('result-count').textContent=data.length+' resultados';
  const byEsp={};
  data.forEach(r=>{if(!byEsp[r.esp])byEsp[r.esp]=[];byEsp[r.esp].push(r);});
  const sorted=Object.entries(byEsp).sort((a,b)=>{
    const aMin=Math.min(...a[1].map(r=>new Date(r.fecha+'T00:00:00')));
    const bMin=Math.min(...b[1].map(r=>new Date(r.fecha+'T00:00:00')));
    return aMin-bMin;
  });
  let html='';
  if(!sorted.length){html='<p class="empty">No hay turnos con esos filtros.</p>';}
  else sorted.forEach(([esp,rows])=>{
    rows.sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora));
    const hayUrgente=rows.some(r=>urgencia(r.fecha)==='hoy');
    html+=`<div class="section"><div class="section-header"><h2>${esp.charAt(0)+esp.slice(1).toLowerCase()}</h2><span class="count-badge">${rows.length} turno${rows.length!==1?'s':''}</span>${hayUrgente?'<span class="count-badge badge-green">Disponible hoy</span>':''}</div><div class="cards">`;
    rows.forEach(r=>{
      const u=urgencia(r.fecha);
      const cls=u==='hoy'?'urg-hoy':u==='semana'?'urg-semana':'urg-mas';
      const lbl=u==='hoy'?'Hoy/mañana':u==='semana'?'Esta semana':'Próximamente';
      html+=`<div class="card"><span class="card-urgency ${cls}">${lbl}</span><div class="card-prof">${r.prof}</div><div class="card-fecha">${fechaLabel(r.fecha)}</div><div class="card-hora">${r.hora} hs</div><div class="card-centro">${r.centro}</div></div>`;
    });
    html+='</div></div>';
  });
  document.getElementById('main').innerHTML=html;
}
function populateFilters(){
  const centros=[...new Set(TURNOS.map(r=>r.centro))].sort();
  const esps=[...new Set(TURNOS.map(r=>r.esp))].sort();
  const sc=document.getElementById('sel-centro');
  const se=document.getElementById('sel-esp');
  centros.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sc.appendChild(o);});
  esps.forEach(e=>{const o=document.createElement('option');o.value=e;o.textContent=e.charAt(0)+e.slice(1).toLowerCase();se.appendChild(o);});
}
async function loadData(){
  try{
    const res=await fetch('data/turnos.json?t='+Date.now());
    const json=await res.json();
    TURNOS=json.turnos||[];
    if(json.updated){
      const d=new Date(json.updated);
      document.getElementById('last-update').textContent='Actualizado '+d.toLocaleDateString('es-AR',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
    }
    populateFilters();
    render();
  }catch(e){
    document.getElementById('main').innerHTML='<p class="empty">Error al cargar los datos.</p>';
  }
}
['sel-centro','sel-esp','sel-urgencia','buscador'].forEach(id=>document.getElementById(id).addEventListener('input',render));
loadData();
</script>
</body>
</html>
